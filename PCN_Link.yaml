models:
  - name: PCN Scenario Planner
    id: pcn-sp
    version: 0.0.1
    type_of_decision: Strategic scenario planning
    type_of_output: Qualitative risk assessment and scenario comparison
    description_URL: https://www.pcnhub.ac.uk/dss-planner
    purpose: Support strategic decision-making for PCN management
    description: >
      THE PEST: Potato cyst nematodes (PCN) Globodera pallida and Globodera rostochiensis are soil-borne plant-parasitic nematodes that infect potato roots to divert host resources via syncytia formation and cause significant yield loss. The cyst stage enables long-term survival in soil making management challenging.

    citation: 'James Price et al. (PCN Hub)'
    keywords: 'potato cyst nematode;PCN;Globodera;crop rotation;resistance;nematicides'
    platform_validated: true
    pests:
      - GLOBPA
      - GLOBRO
    crops:
      - SOLTU
    authors:
      - name: James Price
        email: James.Price@hutton.ac.uk
        organization: The James Hutton Institute
